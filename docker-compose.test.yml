services:
  # ==========================================
  # 1. THE DISPOSABLE INFRASTRUCTURE (No Volumes!)
  # ==========================================
  postgres-test:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=zeyiad123123
      - POSTGRES_DB=mySecond
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      retries: 5
  core-service-test:
      build:
        context: ./backend      # <--- Keep this pointed at the backend folder!
        target: builder
      env_file:
        - ./backend/.env.test
      environment:
        - DB_HOST=postgres-test
        - DB_DATABASE=mySecond
        - TEST_DB_HOST=postgres-test
        - TEST_DB_NAME=mySecond
        - REDIS_HOST=redis-test
        - RABBITMQ_URL=amqp://guest:guest@rabbitmq-test:5672
      depends_on:
        postgres-test:
          condition: service_healthy
        redis-test:
          condition: service_healthy
        rabbitmq-test:
          condition: service_healthy
      command: [ "pnpm", "run", "test:all" ]