services:
  # ==========================================
  # 1. THE DISPOSABLE INFRASTRUCTURE (No Volumes!)
  # ==========================================
  postgres-test:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quickbite_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      retries: 5
  core-service-test:
    build:
      context: ./backend # <--- Keep this pointed at the backend folder!
      target: builder
    environment:
      - NODE_ENV=test
      - PORT=3001
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=quickbite_test
      - DB_POOL_MIN=0
      - DB_POOL_MAX=5
      - TEST_DB_HOST=postgres-test
      - TEST_DB_PORT=5432
      - TEST_DB_USERNAME=postgres
      - TEST_DB_PASSWORD=postgres
      - TEST_DB_NAME=quickbite_test
      - JWT_ACCESS_SECRET=test-access-secret
      - JWT_REFRESH_SECRET=test-refresh-secret
      - JWT_ACCESS_EXPIRES_IN=3600
      - JWT_REFRESH_EXPIRES_IN=86400
      - CORS_ORIGINS=http://localhost:3000
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-test:5672
      - MAILJET_API_KEY=test
      - MAILJET_SECRET_KEY=test
      - MAILJET_FROM_EMAIL=test@example.com
      - MAILJET_FROM_NAME=Test
      - INTERNAL_API_KEY=test-internal-key
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
    command: ["pnpm", "run", "test:all"]
