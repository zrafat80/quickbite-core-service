name: Core Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Tests
        # The ultimate test execution command
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from core-service-test

      - name: Matrix Teardown
        # Guarantees the server is scrubbed clean, even if tests fail!
        if: always()
        run: docker compose -f docker-compose.test.yml down -v